[server]
headless = true
address = "0.0.0.0"
port = 8501
enableCORS = false
enableXsrfProtection = true

# Встроенная тёмная тема Streamlit (виджеты, фон, сайдбар).
# Вернуть светлую: base = "light" и прежние background/secondary/text.
# В UI приложения: меню ⋮ → Settings → Theme (можно Light / Dark / Use system).
[theme]
base = "dark"
primaryColor = "#3b82f6"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#262730"
textColor = "#fafafa"
font = "sans serif"

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
